<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <title>Job Application Tracker</title>
  </head>

  <body class="font-['Geist'] bg-[#F8FAFC]">
    <header class="w-[80%] mx-auto mt-[60px]">
      <h1 class="text-6xl font-bold text-[#002C5C] mb-5">
        Job Application Tracker
      </h1>
      <div class="grid grid-cols-3 gap-8">
        <div class="bg-white p-4 rounded-2xl">
          <p class="text-[#323B49] font-medium">Total</p>
          <p id="total" class="font-bold text-2xl text-black">0</p>
        </div>
        <div class="bg-white p-4 rounded-2xl">
          <p class="text-[#323B49] font-medium">Interview</p>
          <p id="interview-count" class="font-bold text-2xl text-green-600">
            0
          </p>
        </div>
        <div class="bg-white p-4 rounded-2xl">
          <p class="text-[#323B49] font-medium">Rejected</p>
          <p id="rejected-count" class="font-bold text-2xl text-red-600">0</p>
        </div>
      </div>
    </header>
    <hr class="my-[30px] text-[#E6E7E9]" />

    <section class="w-[80%] mx-auto">
      <div class="flex gap-3 mb-8">
        <button
          id="all-btn"
          class="px-4 py-2 rounded-sm bg-blue-600 text-white text-sm font-medium"
        >
          All
        </button>

        <button
          id="interview-btn"
          class="px-4 py-2 rounded-sm bg-gray-100 text-gray-600 text-sm font-medium"
        >
          Interview
        </button>

        <button
          id="rejected-btn"
          class="px-4 py-2 rounded-sm bg-gray-100 text-gray-600 text-sm font-medium"
        >
          Rejected
        </button>
      </div>
    </section>
    <script src="./script.js"></script>
  </body>
</html>
